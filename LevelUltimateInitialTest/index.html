<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sight Reading Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="controls">
      <div class="control-row">
        <label for="keySelect">Key:</label>
        <select id="keySelect">
          <option value="C">C Major</option>
          <option value="G">G Major</option>
          <option value="D">D Major</option>
          <option value="A">A Major</option>
          <option value="F">F Major</option>
          <option value="Bb">B&#9837; Major</option>
          <option value="Am">A minor</option>
          <option value="Em">E minor</option>
          <option value="Dm">D minor</option>
        </select>

        <label for="meterSelect">Meter:</label>
        <select id="meterSelect">
          <option value="4/4">4/4</option>
          <option value="3/4">3/4</option>
        </select>

        <label for="difficultySelect">Difficulty:</label>
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>

        <label for="measuresSelect">Measures:</label>
        <select id="measuresSelect">
          <option value="4">4</option>
          <option value="8" selected>8</option>
          <option value="16">16</option>
        </select>

        <label for="bpmSelect">BPM:</label>
        <select id="bpmSelect">
          <option value="30">30</option>
          <option value="40">40</option>
          <option value="50">50</option>
          <option value="60" selected>60</option>
          <option value="70">70</option>
          <option value="80">80</option>
          <option value="90">90</option>
        </select>
        <button id="dailyChallengeBtn" class="daily-challenge-btn">&#127775; Daily Challenge</button>
      </div>
      <div class="button-row">
        <button id="generateBtn">Generate</button>
        <button id="recordBtn" class="record-btn">Record &amp; Score</button>
        <button id="shareBtn" class="share-btn" disabled>Share Score</button>
        <button id="shareRecordingBtn" class="share-recording-btn" disabled>Share Recording</button>
        <button id="playBtn" class="play-btn" disabled>&#9654; Play</button>
        <button id="metronomeMuteBtn" class="metronome-mute-btn">&#128266; Metronome</button>
        <button id="historyBtn" class="history-btn">&#128202; History</button>
      </div>
    </div>

    <div id="dailyBanner" class="daily-banner" style="display:none;"></div>
    <div id="statusDisplay" class="status"></div>
    <div id="notation"></div>
    <div id="attemptsBar" class="attempts-bar" style="display:none;">
      <span class="attempts-label">Attempts:</span>
      <div id="attemptButtons" class="attempt-buttons"></div>
    </div>
    <div id="scoreDisplay" class="score-display" style="display:none;"></div>
  </div>

  <div id="historyModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <button id="historyCloseBtn" class="modal-close">&times;</button>
      <div id="historyContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
