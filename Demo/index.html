<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sight Reading Generator — Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Mode Selection Overlay -->
  <div id="modeOverlay" class="mode-overlay">
    <div class="mode-select-card">
      <h1>Sight Reading Generator</h1>
      <p class="mode-subtitle">Demo &mdash; Select a mode to begin</p>
      <div class="mode-buttons">
        <button id="selectPractice" class="mode-btn practice-mode-btn">
          <span class="mode-name">Practice</span>
          <span class="mode-desc">Listen &amp; learn with audio playback</span>
        </button>
        <button id="selectChallenge" class="mode-btn challenge-mode-btn">
          <span class="mode-name">Challenge</span>
          <span class="mode-desc">Record yourself &amp; get scored</span>
        </button>
      </div>
    </div>
  </div>

  <div class="container" id="mainContainer" style="display:none;">
    <div class="controls">
      <div class="control-row">
        <label for="meterSelect">Meter:</label>
        <select id="meterSelect">
          <option value="4/4">4/4</option>
          <option value="3/4">3/4</option>
        </select>

        <label for="measuresSelect">Measures:</label>
        <select id="measuresSelect">
          <option value="4">4</option>
          <option value="8" selected>8</option>
        </select>

        <label for="bpmSelect">BPM:</label>
        <select id="bpmSelect">
          <option value="30">30</option>
          <option value="40">40</option>
          <option value="50">50</option>
          <option value="60" selected>60</option>
          <option value="70">70</option>
          <option value="80">80</option>
          <option value="90">90</option>
        </select>
        <span id="modeLabel" class="mode-label"></span>
      </div>
      <div class="button-row">
        <button id="generateBtn">Generate</button>
        <button id="playBtn" class="play-btn">&#9654; Begin</button>
        <!-- <button id="shareBtn" class="share-btn challenge-only" disabled>Share Score</button> -->
        <button id="shareRecordingBtn" class="share-recording-btn challenge-only" disabled>Share Recording</button>
      </div>
    </div>

    <div id="statusDisplay" class="status"></div>
    <div id="notation"></div>
    <div id="attemptsBar" class="attempts-bar challenge-only" style="display:none;">
      <span class="attempts-label">Attempts:</span>
      <div id="attemptButtons" class="attempt-buttons"></div>
    </div>
    <div id="scoreDisplay" class="score-display challenge-only" style="display:none;"></div>
    <div class="mode-switch-container">
      <button id="switchModeBtn" class="mode-switch-btn">Switch Modes</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
